###############################################################
# EthicFlow — nginx configuration template
# Used by the frontend Docker container to:
#   1. Serve the Vite static build as a React SPA
#   2. Proxy /api/* requests to the backend service
#
# ${BACKEND_URL} is substituted at container startup via envsubst.
# Set BACKEND_URL env var to the backend's Railway public URL,
# e.g. https://ethicflow-api-xxxx.up.railway.app
###############################################################

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for common web assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Proxy all API calls to the backend service
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the browser Origin so CORS on the backend works correctly
        proxy_set_header Origin            $http_origin;
    }

    # SPA fallback: unknown paths → index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
