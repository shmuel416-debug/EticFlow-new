# ═══════════════════════════════════════════════════
# EthicFlow — PROD Environment Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════

version: '3.9'

services:
  # ─── PROD DB overrides ───
  db:
    ports: []  # Don't expose DB port in production

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethicflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AUTH_EXCHANGE_TTL_MS: ${AUTH_EXCHANGE_TTL_MS:-90000}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      CALENDAR_PROVIDER: ${CALENDAR_PROVIDER:-internal}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - generated:/app/generated

  # ─── Frontend (Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: ethicflow-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certs (if HTTPS)

volumes:
  uploads:
    name: ethicflow-uploads
  generated:
    name: ethicflow-generated
