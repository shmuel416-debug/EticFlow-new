name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/eticflow?schema=public' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Backend tests
        run: npm test

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend build
        run: npm run build

  e2e-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check if E2E role secrets are configured
        id: e2e-check
        run: |
          if [ -n "$E2E_RESEARCHER_EMAIL" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi
        env:
          E2E_RESEARCHER_EMAIL: ${{ secrets.E2E_RESEARCHER_EMAIL }}

      - name: Skip E2E (role secrets not configured)
        if: steps.e2e-check.outputs.configured == 'false'
        run: echo "⚠️  E2E role credentials not configured — skipping role-based E2E tests. Add E2E_* secrets in GitHub → Settings → Secrets to enable."

      - name: Install Playwright browsers
        if: steps.e2e-check.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright core E2E (strict)
        if: steps.e2e-check.outputs.configured == 'true'
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://127.0.0.1:4173' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'https://frontend-eticflow-dev.up.railway.app/api' }}
          E2E_RESEARCHER_EMAIL: ${{ secrets.E2E_RESEARCHER_EMAIL }}
          E2E_RESEARCHER_PASSWORD: ${{ secrets.E2E_RESEARCHER_PASSWORD }}
          E2E_SECRETARY_EMAIL: ${{ secrets.E2E_SECRETARY_EMAIL }}
          E2E_SECRETARY_PASSWORD: ${{ secrets.E2E_SECRETARY_PASSWORD }}
          E2E_REVIEWER_EMAIL: ${{ secrets.E2E_REVIEWER_EMAIL }}
          E2E_REVIEWER_PASSWORD: ${{ secrets.E2E_REVIEWER_PASSWORD }}
          E2E_CHAIRMAN_EMAIL: ${{ secrets.E2E_CHAIRMAN_EMAIL }}
          E2E_CHAIRMAN_PASSWORD: ${{ secrets.E2E_CHAIRMAN_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npm run e2e:ci:strict

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
