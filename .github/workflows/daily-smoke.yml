name: Daily Smoke

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    env:
      DEV_API_URL: ${{ vars.DEV_API_URL }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate DEV_API_URL variable
        shell: bash
        run: |
          if [ -z "${DEV_API_URL}" ]; then
            echo "Missing DEV_API_URL repo variable."
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Run daily API smoke
        env:
          TEST_BASE_URL: ${{ env.DEV_API_URL }}
        run: node tests/manual/daily-production-smoke.mjs

  e2e:
    runs-on: ubuntu-latest
    env:
      DEV_API_URL: ${{ vars.DEV_API_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate DEV_API_URL variable
        shell: bash
        run: |
          if [ -z "${DEV_API_URL}" ]; then
            echo "Missing DEV_API_URL repo variable."
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Resolve E2E API URL
        shell: bash
        run: |
          CLEAN_BASE="${DEV_API_URL%/}"
          echo "E2E_API_URL=${CLEAN_BASE}/api" >> "$GITHUB_ENV"

      - name: Run Playwright E2E
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
